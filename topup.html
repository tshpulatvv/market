<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card-info { background: #1c212a; border-radius: 15px; padding: 20px; border: 1px solid #5865f2; margin-bottom: 25px; }
        .card-num { font-size: 20px; color: #ebba4e; font-weight: bold; display: block; margin-top: 10px; letter-spacing: 1px; }
        
        /* Поле ввода для ЦИФР */
        input { 
            width: 100%; 
            background: #0d1117; 
            border: 2px solid #30363d; 
            padding: 15px; 
            border-radius: 12px; 
            color: white; 
            font-size: 18px; 
            margin-top: 10px; 
            outline: none; 
            box-sizing: border-box;
            text-align: center;
        }
        input:focus { border-color: #00c853; }

        .send-btn { background: #00c853; color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; margin-top: 25px; cursor: pointer; font-size: 16px; }
        label { font-size: 14px; color: #8b949e; }
    </style>
</head>
<body>
    <h3>$ Пополнение $</h3>
    
    <div class="card-info">
        <label>Переведите на эту карту:</label>
        <span class="card-num">8600 1234 5678 9000</span>
    </div>

    <div style="text-align: left;">
        <label>Введите номер вашей карты или сумму оплаты:</label>
        <input type="text" id="payInput" inputmode="numeric" pattern="[0-9]*" placeholder="0000 0000 0000 0000">
    </div>

    <button class="send-btn" onclick="sendToBot()">Отправить данные</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendToBot() {
            let val = document.getElementById('payInput').value;
            if(!val) {
                alert("Сначала введите данные!");
                return;
            }
            // Отправляем текст в твой bot.py
            tg.sendData("💳 Данные оплаты: " + val);
            tg.close();
        }
    </script>
</body>
</html>
