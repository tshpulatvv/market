<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card-info { background: #1c212a; border-radius: 15px; padding: 20px; border: 1px solid #5865f2; margin-bottom: 25px; }
        input { width: 100%; background: #0d1117; border: 2px solid #30363d; padding: 18px; border-radius: 12px; color: #00c853; font-size: 20px; font-weight: bold; text-align: center; outline: none; box-sizing: border-box; }
        .btn { background: #00c853; color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; margin-top: 25px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Пополнение баланса</h3>
    <div class="card-info">
        <span style="color: #8b949e; font-size: 12px;">Переведите на карту:</span><br>
        <b style="color:#ebba4e; font-size: 20px;">8600 0000 0000 0000</b>
    </div>

    <input type="text" id="cardInput" inputmode="numeric" placeholder="0000 0000 0000 0000" maxlength="19">
    <button class="btn" onclick="sendDataToBot()">Подтвердить оплату</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const input = document.getElementById('cardInput');

        // Автоматические пробелы через каждые 4 цифры
        input.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            let formatted = val.match(/.{1,4}/g)?.join(' ') || '';
            e.target.value = formatted.substring(0, 19);
        });

        function sendDataToBot() {
            let res = input.value;
            if(res.length < 19) return alert("Введите 16 цифр карты!");
            
            // Отправляем данные в бот
            tg.sendData(res);
            
            // Чтобы приложение не закрывалось сразу (не "вылетало"), 
            // мы можем НЕ вызывать tg.close(), либо делать это через задержку.
            // Но в Telegram Mini App sendData ВСЕГДА закрывает окно. 
            // Это особенность Telegram.
        }
    </script>
</body>
</html>
