<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card-display { background: #1c212a; border-radius: 15px; padding: 20px; border: 1px solid #5865f2; margin-bottom: 25px; }
        .card-num { font-size: 22px; color: #ebba4e; font-weight: bold; letter-spacing: 1px; }
        
        /* Поле ввода: ТОЛЬКО ЦИФРЫ */
        input { 
            width: 100%; 
            background: #0d1117; 
            border: 2px solid #30363d; 
            padding: 18px; 
            border-radius: 12px; 
            color: white; 
            font-size: 18px; 
            outline: none; 
            box-sizing: border-box;
            text-align: center;
        }
        input:focus { border-color: #00c853; }
        .hint { font-size: 13px; color: #8b949e; margin-bottom: 8px; display: block; text-align: left; }
        .send-btn { background: #00c853; color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; margin-top: 25px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <h3>Пополнение баланса</h3>
    
    <div class="card-display">
        <span style="font-size: 12px; color: #8b949e;">Карта для перевода:</span><br>
        <span class="card-num">8600 0000 0000 0000</span>
    </div>

    <span class="hint">Введите номер вашей карты (откуда платили):</span>
    <input type="text" id="cardNumber" inputmode="numeric" placeholder="0000 0000 0000 0000">

    <button class="send-btn" onclick="sendData()">Подтвердить оплату</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendData() {
            let val = document.getElementById('cardNumber').value;
            if(!val) return alert("Введите номер карты!");
            
            // Отправляем цифры в бот
            tg.sendData("💰 ОПЛАТА С КАРТЫ: " + val);
            tg.close();
        }
    </script>
</body>
</html>
