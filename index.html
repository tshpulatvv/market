<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uchiha Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #1a1d26;
            --input-bg: #11131a;
            --accent-color: #5d68d1;
            --text-main: #ffffff;
            --text-secondary: #8a8d9b;
            --green-btn: #28a745;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }

        .top-bar { display: flex; justify-content: center; align-items: center; background: var(--card-bg); padding: 10px 20px; border-radius: 30px; margin-bottom: 25px; gap: 15px; }
        .balance-amount { font-size: 18px; font-weight: bold; }
        .btn-add-funds { background: var(--green-btn); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; }

        .input-card { background: var(--card-bg); border-radius: 18px; padding: 15px; margin-bottom: 15px; }
        .input-wrapper { background: var(--input-bg); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px; }
        input { background: transparent; border: none; color: white; font-size: 16px; width: 100%; outline: none; }

        .btn-self { background: var(--accent-color); border: none; color: white; padding: 6px 14px; border-radius: 10px; }
        .btn-main-buy { background: linear-gradient(90deg, #5d68d1, #4e5ac8); width: 100%; border: none; color: white; padding: 18px; border-radius: 18px; font-size: 18px; font-weight: bold; margin-top: 10px; }

        /* Модальное окно */
        #modal-pay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); width: 85%; border-radius: 20px; padding: 25px; text-align: center; }
        .btn-pay-confirm { background: #ffc107; color: black; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="balance-info">
            <div style="font-size: 10px; color: var(--text-secondary);">БАЛАНС:</div>
            <div class="balance-amount">0 сум</div>
        </div>
        <button class="btn-add-funds" onclick="openModal()">+ Пополнить</button>
    </div>

    <div style="font-size: 14px; color: var(--text-secondary); margin: 0 0 8px 5px;">Telegram Username</div>
    <div class="input-card">
        <div class="input-wrapper">
            <span>@</span>
            <input type="text" id="target_user" placeholder="username">
            <button class="btn-self" onclick="fillMe()">Себе</button>
        </div>
    </div>

    <div style="font-size: 14px; color: var(--text-secondary); margin: 0 0 8px 5px;">Количество (Мин: 50)</div>
    <div class="input-card">
        <div class="input-wrapper">
            <span style="color: #ffcc00;">★</span>
            <input type="number" id="stars_count" value="0" oninput="updatePrice()">
            <span id="price_display" style="color: var(--text-secondary); font-size: 14px;">0 сум</span>
        </div>
    </div>

    <button class="btn-main-buy" onclick="sendToBot()">Купить</button>

    <div id="modal-pay">
        <div class="modal-content">
            <h3 style="margin: 0 0 15px 0;">💳 Оплата картой</h3>
            <div class="input-wrapper">
                <input type="number" id="topup_amount" placeholder="Сумма пополнения...">
            </div>
            <button class="btn-pay-confirm" onclick="confirmTopup()">Перейти к оплате 🚀</button>
            <p onclick="closeModal()" style="color: var(--text-secondary); margin-top: 15px; font-size: 14px;">Закрыть</p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function fillMe() { if(tg.initDataUnsafe.user) document.getElementById('target_user').value = tg.initDataUnsafe.user.username; }
        function updatePrice() { document.getElementById('price_display').innerText = (document.getElementById('stars_count').value * 300) + " сум"; }
        function openModal() { document.getElementById('modal-pay').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-pay').style.display = 'none'; }

        function sendToBot() {
            tg.sendData(JSON.stringify({
                item: "Telegram Stars",
                quantity: document.getElementById('stars_count').value,
                amount: document.getElementById('stars_count').value * 300,
                target: "@" + document.getElementById('target_user').value
            }));
        }

        function confirmTopup() {
            tg.sendData(JSON.stringify({
                type: "topup",
                amount: document.getElementById('topup_amount').value
            }));
        }
    </script>
</body>
</html>
