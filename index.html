<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uchiha Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #090a0f;
            --card-purple: #161a2e;
            --accent-blue: #4e5ac8;
            --accent-purple: #7b61ff;
            --text-main: #ffffff;
            --text-gray: #a0a4b8;
            --green-topup: #24b47e;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Кнопка пополнения наверху */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            padding: 10px 0;
        }
        .btn-plus-topup {
            background-color: var(--green-topup);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(36, 180, 126, 0.3);
            cursor: pointer;
        }

        /* Заголовок */
        .market-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Карточки/Кнопки */
        .action-card {
            background: linear-gradient(145deg, var(--card-purple), #1c223d);
            border: 1px solid rgba(123, 97, 255, 0.2);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            transition: transform 0.2s;
        }
        .action-card:active { transform: scale(0.98); }

        .icon-box { font-size: 40px; margin-bottom: 15px; }
        
        .btn-action {
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(78, 90, 200, 0.4);
        }

        /* Модалка для пополнения */
        #topup-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-purple);
            width: 85%;
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--accent-purple);
            text-align: center;
        }
        .modal-input {
            background: #0f1221;
            border: 1px solid var(--accent-blue);
            color: white;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            margin: 20px 0;
            text-align: center;
            outline: none;
        }

        .btn-confirm { background: var(--green-topup); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="btn-plus-topup" onclick="showModal()">+ Пополнить</button>
    </div>

    <div class="market-title">UCHIHA MARKET</div>

    <div class="action-card">
        <div class="icon-box">🌟</div>
        <div style="color: var(--text-gray); margin-bottom: 15px;">Покупка Telegram Stars</div>
        <button class="btn-action" onclick="order('Stars')">Купить Stars</button>
    </div>

    <div class="action-card">
        <div class="icon-box">💎</div>
        <div style="color: var(--text-gray); margin-bottom: 15px;">Telegram Premium подписка</div>
        <button class="btn-action" onclick="order('Premium')">Купить Premium</button>
    </div>

    <div id="topup-modal">
        <div class="modal-content">
            <h2 style="margin:0">💰 Пополнение</h2>
            <p style="color: var(--text-gray); font-size: 14px; margin-top:10px">Введите сумму (мин. 1000 сум)</p>
            <input type="number" id="amount-input" class="modal-input" placeholder="0.00 сум">
            <button class="btn-confirm" onclick="sendTopup()">Перейти к оплате</button>
            <p onclick="closeModal()" style="margin-top:20px; color: var(--text-gray); font-size: 14px;">Отмена</p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function showModal() { document.getElementById('topup-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('topup-modal').style.display = 'none'; }

        function sendTopup() {
            let val = document.getElementById('amount-input').value;
            if (val < 1000) { alert("Минимальная сумма 1000 сум"); return; }
            tg.sendData(JSON.stringify({ type: "topup", amount: val }));
        }

        function order(type) {
            tg.sendData(JSON.stringify({ type: "order", item: type }));
        }
    </script>
</body>
</html>
