<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0d14; color: white; font-family: sans-serif; padding: 15px; }
        .plus-btn { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 50px; float: right; font-weight: bold; }
        .card { background: #161925; border-radius: 20px; padding: 20px; margin-top: 60px; border: 1px solid #333; margin-bottom: 20px; }
        .btn-buy { background: linear-gradient(90deg, #6366f1, #8b5cf6); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; }
        input { background: #0f111a; border: none; color: white; padding: 12px; width: 90%; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <button class="plus-btn" onclick="topup()">+ Пополнить</button>
    
    <div class="card">
        <h3>⭐️ Купить Stars</h3>
        <input type="text" id="u1" placeholder="@username">
        <input type="number" id="q1" placeholder="Количество">
        <button class="btn-buy" onclick="buy('Stars')">Заказать Stars</button>
    </div>

    <div class="card">
        <h3>💎 Купить Premium</h3>
        <input type="text" id="u2" placeholder="@username">
        <select id="p2" style="width:100%; padding:10px; border-radius:10px; background:#0f111a; color:white; border:none;">
            <option value="45000">1 месяц - 45к</option>
            <option value="180000">3 месяца - 180к</option>
            <option value="230000">6 месяцев - 230к</option>
            <option value="390000">12 месяцев - 390к</option>
        </select>
        <button class="btn-buy" onclick="buy('Premium')">Заказать Premium</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        function topup() {
            let s = prompt("Введите сумму пополнения:");
            if(s) tg.sendData(JSON.stringify({type: "topup", amount: s}));
        }
        function buy(type) {
            let u = type === 'Stars' ? document.getElementById('u1').value : document.getElementById('u2').value;
            let p = type === 'Stars' ? (document.getElementById('q1').value * 300) : document.getElementById('p2').value;
            tg.sendData(JSON.stringify({item: type, user: u, price: p}));
        }
    </script>
</body>
</html>
