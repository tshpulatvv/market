<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f111a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #1a1d26; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        input { background: #11131a; border: none; color: white; padding: 10px; width: 80%; border-radius: 10px; margin: 10px 0; }
        button { background: linear-gradient(90deg, #5d68d1, #4e5ac8); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .price { color: #8a8d9b; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🌟 Покупка Stars</h3>
        <input type="number" id="stars" placeholder="Кол-во звезд (мин. 50)" oninput="calc()">
        <p class="price" id="res">0 сум</p>
        <button onclick="buy('Stars')">Купить Stars</button>
    </div>

    <div class="card">
        <h3>💎 Telegram Premium</h3>
        <button onclick="buy('Premium 3 месяца', 150000)">3 месяца — 150 000 сум</button>
        <button onclick="buy('Premium 6 месяцев', 280000)" style="margin-top:10px">6 месяцев — 280 000 сум</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        function calc() {
            let val = document.getElementById('stars').value;
            document.getElementById('res').innerText = (val * 300) + " сум";
        }
        function buy(name, price) {
            let starsVal = document.getElementById('stars').value;
            let finalPrice = price || (starsVal * 300);
            tg.sendData(JSON.stringify({
                item: name,
                amount: finalPrice,
                quantity: starsVal || 1
            }));
        }
    </script>
</body>
</html>
