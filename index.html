<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uchiha Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0b0d14;
            --card: #161925;
            --accent: #6366f1;
            --purple: #8b5cf6;
            --green: #10b981;
            --text-main: #ffffff;
            --text-sec: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* Кнопка Пополнить (Верхняя зона) */
        .header { display: flex; justify-content: flex-end; }
        .btn-topup {
            background: var(--green);
            color: white; border: none;
            padding: 12px 24px; border-radius: 50px;
            font-weight: bold; font-size: 14px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            cursor: pointer;
        }

        /* Стили карточек */
        .card {
            background: var(--card);
            border-radius: 24px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .icon { font-size: 40px; margin-bottom: 10px; }
        .card-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .card-desc { color: var(--text-sec); font-size: 14px; margin-bottom: 20px; }

        .btn-main {
            background: linear-gradient(90deg, var(--accent), var(--purple));
            color: white; border: none; width: 100%;
            padding: 16px; border-radius: 16px; font-weight: bold; font-size: 16px;
            cursor: pointer;
        }

        /* Модальное окно пополнения */
        #modal-topup {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: var(--card); width: 85%; padding: 30px; border-radius: 28px; text-align: center;
        }
        .input-sum {
            background: #0f111a; border: 1px solid var(--accent); color: white;
            width: 100%; padding: 15px; border-radius: 12px; margin: 20px 0; font-size: 18px; text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="btn-topup" onclick="showModal()">+ Пополнить</button>
    </div>

    <div style="text-align: center; font-size: 24px; font-weight: 800; color: var(--purple);">UCHIHA MARKET</div>

    <div class="card">
        <div class="icon">🌟</div>
        <div class="card-title">Telegram Stars</div>
        <div class="card-desc">Покупка звезд для вашего аккаунта</div>
        <button class="btn-main" onclick="sendOrder('Stars')">Купить Stars</button>
    </div>

    <div class="card">
        <div class="icon">💎</div>
        <div class="card-title">Telegram Premium</div>
        <div class="card-desc">Подписки на 1, 3, 6 или 12 месяцев</div>
        <button class="btn-main" onclick="sendOrder('Premium')">Купить Premium</button>
    </div>

    <div id="modal-topup">
        <div class="modal-content">
            <h3 style="margin:0">💰 Пополнение баланса</h3>
            <input type="number" id="sum" class="input-sum" placeholder="Введите сумму (сум)">
            <button class="btn-main" style="background: var(--green);" onclick="confirmTopup()">Перейти к оплате</button>
            <p onclick="hideModal()" style="margin-top:20px; color: var(--text-sec); font-size: 14px; cursor: pointer;">Отмена</p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function showModal() { document.getElementById('modal-topup').style.display = 'flex'; }
        function hideModal() { document.getElementById('modal-topup').style.display = 'none'; }

        function sendOrder(item) {
            tg.sendData(JSON.stringify({ type: "order", item: item }));
        }

        function confirmTopup() {
            let val = document.getElementById('sum').value;
            if(val < 1000) { alert("Мин. сумма 1000 сум"); return; }
            tg.sendData(JSON.stringify({ type: "topup", amount: val }));
        }
    </script>
</body>
</html>
