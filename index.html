<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uchiha Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0d14; --card: #161925; --accent: #6366f1; --purple: #8b5cf6; --green: #10b981; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .btn-plus { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; }

        .card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); display: none; }
        .active { display: block; }

        .input-group { background: #0f111a; border-radius: 14px; padding: 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 16px; }

        .btn-buy { background: linear-gradient(90deg, var(--accent), var(--purple)); color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: bold; font-size: 16px; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .opt { background: #0f111a; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid transparent; }
        .opt.sel { border-color: var(--purple); background: rgba(139, 92, 246, 0.1); }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .m-box { background: var(--card); width: 80%; padding: 25px; border-radius: 25px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <button class="btn-plus" onclick="openM()">+ Пополнить</button>
    </div>

    <div id="page-stars" class="card">
        <h3 style="margin-top:0">🌟 Telegram Stars</h3>
        <div class="input-group">
            <input type="text" id="s_u" placeholder="@username">
            <button onclick="me('s_u')" style="background:var(--accent); border:none; color:white; padding:5px; border-radius:5px;">Себе</button>
        </div>
        <div class="input-group">
            <input type="number" id="s_q" placeholder="Количество" oninput="c()">
            <span id="s_p" style="font-size:12px; color:#94a3b8">0 сум</span>
        </div>
        <button class="btn-buy" onclick="buyS()">Купить Stars</button>
    </div>

    <div id="page-prem" class="card">
        <h3 style="margin-top:0">💎 Telegram Premium</h3>
        <div class="input-group">
            <input type="text" id="p_u" placeholder="@username">
            <button onclick="me('p_u')" style="background:var(--accent); border:none; color:white; padding:5px; border-radius:5px;">Себе</button>
        </div>
        <div class="grid">
            <div class="opt" onclick="sP(this, '1 ой', 45000)">1 ой<br><small>45к</small></div>
            <div class="opt" onclick="sP(this, '3 ой', 180000)">3 ой<br><small>180к</small></div>
            <div class="opt sel" onclick="sP(this, '6 ой', 230000)">6 ой<br><small>230к</small></div>
            <div class="opt" onclick="sP(this, '12 ой', 390000)">12 ой<br><small>390к</small></div>
        </div>
        <button class="btn-buy" onclick="buyP()">Купить Premium</button>
    </div>

    <div id="modal"><div class="m-box">
        <h3>💰 Пополнение</h3>
        <div class="input-group"><input type="number" id="t_v" placeholder="Сумма..."></div>
        <button class="btn-buy" style="background:var(--green)" onclick="doT()">Оплатить</button>
        <p onclick="closeM()" style="margin-top:15px; cursor:pointer">Закрыть</p>
    </div></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let sel = { n: '6 ой', p: 230000 };

        // Проверка: какую страницу открыть?
        const params = new URLSearchParams(window.location.search);
        if(params.get('type') === 'premium') {
            document.getElementById('page-prem').classList.add('active');
        } else {
            document.getElementById('page-stars').classList.add('active');
        }

        function me(id) { if(tg.initDataUnsafe.user) document.getElementById(id).value = tg.initDataUnsafe.user.username; }
        function c() { document.getElementById('s_p').innerText = (document.getElementById('s_q').value * 300) + " сум"; }
        function sP(el, n, p) {
            document.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
            el.classList.add('sel');
            sel = { n, p };
        }
        function openM() { document.getElementById('modal').style.display='flex'; }
        function closeM() { document.getElementById('modal').style.display='none'; }
        
        function buyS() { tg.sendData(JSON.stringify({t:"Stars", u:document.getElementById('s_u').value, q:document.getElementById('s_q').value, p:document.getElementById('s_q').value*300})); }
        function buyP() { tg.sendData(JSON.stringify({t:"Premium", u:document.getElementById('p_u').value, d:sel.n, p:sel.p})); }
        function doT() { tg.sendData(JSON.stringify({t:"TopUp", a:document.getElementById('t_v').value})); }
    </script>
</body>
</html>
