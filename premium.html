<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .header { margin-bottom: 25px; }
        .header h1 { color: #5865f2; margin: 0; font-size: 24px; }
        .header p { color: #8b949e; font-size: 14px; margin-top: 5px; }
        
        .price-card { 
            background: #1c212a; 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .price-card:active { transform: scale(0.98); background: #252b36; }
        .info { text-align: left; }
        .info b { display: block; font-size: 18px; color: #ebba4e; }
        .info span { color: #8b949e; font-size: 13px; }
        .buy-btn { background: #00c853; color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Uchiha Market 💜</h1>
        <p>Цены на Telegram Premium</p>
    </div>

    <div class="price-card" onclick="buy('Premium 1 месяц - 45 000 сум')">
        <div class="info">
            <b>1 месяц ⭐️</b>
            <span>45 000 сум</span>
        </div>
        <button class="buy-btn">Купить</button>
    </div>

    <div class="price-card" onclick="buy('Premium 3 месяца - 180 000 сум')">
        <div class="info">
            <b>3 месяца 🎁</b>
            <span>180 000 сум</span>
        </div>
        <button class="buy-btn">Купить</button>
    </div>

    <div class="price-card" onclick="buy('Premium 6 месяцев - 230 000 сум')">
        <div class="info">
            <b>6 месяцев 🎁</b>
            <span>230 000 сум</span>
        </div>
        <button class="buy-btn">Купить</button>
    </div>

    <div class="price-card" onclick="buy('Premium 12 месяцев - 390 000 сум')">
        <div class="info">
            <b>12 месяцев 🎁</b>
            <span>390 000 сум</span>
        </div>
        <button class="buy-btn">Купить</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function buy(item) {
            tg.sendData("🛒 Заказ: " + item);
            tg.close();
        }
    </script>
</body>
</html>
